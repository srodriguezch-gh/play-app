<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Game{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
    <link href="/static/silrod/css/silrod.css" rel="stylesheet" />
    <link href="/static/silrod/css/silrod-components.css" rel="stylesheet" />
    <link href="/static/theme.css" rel="stylesheet" />
    <script src="/static/game-client.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .nav-link { padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500; color: #6b7280; transition: all 0.2s; }
        .nav-link:hover { color: #111827; background: #f3f4f6; }
        .nav-link.active { color: #2563eb; border-bottom: 2px solid #2563eb; }
        .global-progress-bar { height: 3px; background: linear-gradient(to right, #3b82f6, #2563eb); transition: width 0.3s; position: fixed; top: 0; left: 0; z-index: 100; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <div class="global-progress-bar" id="global-progress" style="width: 0%;"></div>
    
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4">
            <div class="flex items-center justify-between gap-4 mb-4">
                <div class="flex items-center gap-3">
                    <a href="/" class="text-lg font-bold text-slate-800">silrod</a>
                    <span class="text-slate-300">|</span>
                    <span class="text-sm font-medium text-blue-600">Game Hub</span>
                </div>
                <a href="https://home.silrod.org" class="text-slate-500 hover:text-slate-900 transition-colors flex items-center">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a 1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                </a>
            </div>
            
            <nav class="flex gap-6 border-t border-slate-100 pt-3 text-sm overflow-x-auto">
                <a href="/leaderboard" class="nav-link whitespace-nowrap">
                    <i class="fas fa-trophy mr-1.5"></i>Leaderboard
                </a>
                <a href="/tasks" class="nav-link whitespace-nowrap">
                    <i class="fas fa-tasks mr-1.5"></i>Tasks
                </a>
            </nav>
        </div>
    </header>

    <div id="spinner" class="htmx-indicator fixed top-16 right-4 z-50">
        <div class="flex items-center gap-2 bg-white border border-slate-200 px-3 py-2 rounded-lg shadow-md">
            <div class="w-2 h-2 rounded-full animate-pulse bg-blue-600"></div>
            <span class="text-xs text-slate-600">Updating...</span>
        </div>
    </div>

    <main class="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 py-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-slate-200 py-6 mt-auto">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 flex flex-col sm:flex-row items-center justify-between gap-2 text-sm text-slate-600">
            <span>Silvio Rodriguez © 2026</span>
            <span class="text-xs">Game Hub</span>
        </div>
    </footer>

    <script>
    // HTMX Progress Bar
    document.body.addEventListener('htmx:beforeRequest', function(e) {
        document.getElementById('global-progress').style.width = '30%';
    });
    document.body.addEventListener('htmx:afterRequest', function(e) {
        document.getElementById('global-progress').style.width = '0%';
    });
    document.body.addEventListener('htmx:xhr:progress', function(e) {
        document.getElementById('global-progress').style.width = ((e.detail.loaded / e.detail.total) * 100) + '%';
    });
    </script>
</body>
</html>
    </footer>

    {% block scripts %}{% endblock %}
    <script>
    document.body.addEventListener('htmx:beforeRequest', function(e) {
        document.getElementById('global-progress').style.width = '30%';
    });
    document.body.addEventListener('htmx:afterRequest', function(e) {
        document.getElementById('global-progress').style.width = '0%';
    });
    document.body.addEventListener('htmx:xhr:progress', function(e) {
        document.getElementById('global-progress').style.width = ((e.detail.loaded / e.detail.total) * 100) + '%';
    });
    </script>
</body>
</html>
