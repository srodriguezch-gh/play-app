{% extends "base.html" %}

{% block title %}Game Hub{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-sm border border-slate-200">
    <div class="px-6 py-4 border-b border-slate-200">
        <div class="flex justify-between items-center">
            <h2 class="text-lg font-semibold text-slate-800">
                <i class="fas fa-trophy mr-2 text-yellow-500"></i>Leaderboard
            </h2>
            <button onclick="refreshLeaderboard()" class="text-sm text-blue-600 hover:text-blue-800">
                <i class="fas fa-redo mr-1"></i>Refresh
            </button>
        </div>
    </div>
    <div class="p-6" hx-get="/api/players" hx-trigger="load, every 30s" hx-swap="innerHTML" id="leaderboard-body">
        <table class="w-full text-left">
            <thead>
                <tr class="text-sm text-slate-500 border-b border-slate-100">
                    <th class="pb-3 font-medium">#</th>
                    <th class="pb-3 font-medium">Player</th>
                    <th class="pb-3 font-medium text-center">Wins</th>
                    <th class="pb-3 font-medium text-center">Losses</th>
                    <th class="pb-3 font-medium text-center">Total</th>
                </tr>
            </thead>
            <tbody id="leaderboard-tbody">
                <tr><td colspan="5" class="py-4 text-slate-400 text-center">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function refreshLeaderboard() {
        const res = await fetch('/api/players');
        if (!res.ok) return;
        const players = await res.json();
        renderLeaderboard(players);
    }

    function renderLeaderboard(players) {
        const sorted = Object.values(players).sort((a, b) => b.wins - a.wins);
        const tbody = document.getElementById("leaderboard-tbody");
        tbody.innerHTML = sorted.map((p, i) => `
            <tr class="border-b border-slate-50 hover:bg-slate-50">
                <td class="py-3 ${i === 0 ? 'text-yellow-500 font-bold' : 'text-slate-400'}">${i + 1}</td>
                <td class="py-3 font-medium text-slate-800">${p.name}</td>
                <td class="py-3 text-center text-green-600 font-medium">${p.wins}</td>
                <td class="py-3 text-center text-red-500">${p.losses}</td>
                <td class="py-3 text-center text-slate-600">${p.wins + p.losses}</td>
            </tr>
        `).join('');
    }

    socket.on("playersResult", (players) => {
        renderLeaderboard(players);
    });

    socket.on("updatePlayers", (players) => {
        renderLeaderboard(players);
    });

    // Initial load
    refreshLeaderboard();
</script>
{% endblock %}
