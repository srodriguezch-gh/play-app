{% extends "base.html" %}

{% block title %}Play — Sign In{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-sm">
        <div class="bg-white border border-slate-200 rounded-lg shadow-sm p-8">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-slate-900">Play</h1>
                <p class="text-sm text-slate-500 mt-1">Sign in to continue</p>
            </div>

            {% if error %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-md text-red-600 text-sm text-center">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login" class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Who are you?</label>
                    <select name="name" id="name" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select player...</option>
                        <option value="Emma">Emma</option>
                        <option value="Mateo">Mateo</option>
                        <option value="Dad">Dad</option>
                    </select>
                </div>

                <div>
                    <label for="pin" class="block text-sm font-medium text-slate-700 mb-1">PIN</label>
                    <input type="password" name="pin" id="pin" placeholder="4-digit PIN" maxlength="4" pattern="\d{4}"
                        required
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-center text-xl tracking-widest" />
                    <p class="text-xs text-slate-500 mt-1 text-center">First time? Enter a 4-digit PIN to set it.</p>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md font-medium text-sm">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
